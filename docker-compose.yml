version: "3.9"

services:
  # Metadata Database (Managed by backend via SQLAlchemy)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: querymind
      POSTGRES_USER: querymind_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Vector Database (Required for Knowledge Base and RAG)
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  # Backend API (FastAPI)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://querymind_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/querymind
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - postgres
      - chromadb
      - ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./uploads:/app/uploads
      - ./chroma_db:/app/chroma_db

  # Local AI Engine (CPU Mode)
  ollama:
    image: ollama/ollama:latest
    container_name: querymind-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Frontend Admin Panel (Vite + React)
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=/
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
  ollama_data:
