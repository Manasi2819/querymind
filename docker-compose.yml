# ══════════════════════════════════════════════════════════════════════════════
#  QueryMind — Single Container Deployment
#  Runs Nginx (Frontend) and FastAPI (Backend) under one container via Supervisor
# ══════════════════════════════════════════════════════════════════════════════

networks:
  querymind_net:
    driver: bridge

services:
  querymind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: querymind
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Optional: To use MySQL instead of default SQLite, provide DATABASE_URL in .env
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - UPLOAD_DIR=/app/data/uploads
      - DATABASE_URL=sqlite:////app/data/querymind_metadata.db
    volumes:
      - ./data:/app/data
    networks:
      - querymind_net
    ports:
      - "80:80"       # Web UI
      - "8000:8000"   # Direct API access (optional)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
