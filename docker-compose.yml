# ══════════════════════════════════════════════════════════════════════════════
#  QueryMind — Single Container Deployment
#  Runs Nginx (Frontend) and FastAPI (Backend) under one container via Supervisor
# ══════════════════════════════════════════════════════════════════════════════

networks:
  querymind_net:
    driver: bridge

services:
  querymind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: querymind
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 🧠 Separate paths for better isolation
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - UPLOAD_DIR=/app/uploads
      - DATABASE_URL=sqlite:////app/data/querymind_metadata.db
    volumes:
      # 🗄️ Named Volumes (Requirement 3: Prefer named volumes over bind mounts)
      - querymind_data:/app/data
      - querymind_chroma:/app/chroma_db
      - querymind_uploads:/app/uploads
    networks:
      - querymind_net
    ports:
      - "80:80"       # Web UI
      - "8000:8000"   # Direct API access (optional)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  querymind_data:
  querymind_chroma:
  querymind_uploads:
