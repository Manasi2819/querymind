server {
    listen 80;
    server_name localhost;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    # Variable for backend to force re-resolution on every request
    set $backend "http://backend:8000";

    # General configuration for React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for API endpoints
    # Use variable in proxy_pass to prevent IP caching
    location /admin {
        # CORS Headers for integration
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE, PATCH' always;
        if ($request_method = 'OPTIONS') { return 204; }

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /chat {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        if ($request_method = 'OPTIONS') { return 204; }

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /sessions {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, PATCH, OPTIONS' always;
        if ($request_method = 'OPTIONS') { return 204; }

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
