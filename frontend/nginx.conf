server {
    listen 80;
    server_name localhost;

    # Docker internal DNS resolver — forces re-lookup on each request
    resolver 127.0.0.11 valid=30s;

    # Root directory for React SPA static files
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml;

    # Backend upstream variable — prevents IP caching, enables hot-reload
    set $backend "http://backend:8000";

    # ── React SPA: serve index.html for all non-file routes ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── /admin — Admin API endpoints ────────────────────────────────────────
    location /admin {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE, PATCH, PUT' always;
        if ($request_method = 'OPTIONS') { return 204; }

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;

        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ── /chat — Chat / SSE streaming endpoint ───────────────────────────────
    location /chat {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        if ($request_method = 'OPTIONS') { return 204; }

        # Extended timeout for LLM streaming responses (up to 5 minutes)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;

        # Required for SSE (Server-Sent Events) streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Cache-Control no-cache;

        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'keep-alive';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── /sessions — Chat session management ────────────────────────────────
    location /sessions {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, PATCH, OPTIONS' always;
        if ($request_method = 'OPTIONS') { return 204; }

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 30s;

        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ── /ingest — File ingestion endpoint ───────────────────────────────────
    location /ingest {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        if ($request_method = 'OPTIONS') { return 204; }

        # Large timeout for file upload + embedding
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;

        # Allow large file uploads (up to 100MB)
        client_max_body_size 100M;

        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── /widget — Embeddable chat widget static files ───────────────────────
    location /widget {
        proxy_read_timeout 30s;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Error pages ─────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
